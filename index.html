<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DnD Character Tracker (Local)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Landing screen -->
  <div id="landingOverlay">
    <div class="landing-card">
      <div class="landing-title">⚔️ DnD Character Tracker</div>
      <div class="landing-sub">Choose how you want to play</div>
      <div class="landing-btns" id="landingMainBtns">
        <button class="btn landing-btn" id="btnHost">Host a Game</button>
        <button class="btn landing-btn" id="btnChooseChar">Choose Character</button>
      </div>
      <!-- Character picker (step 2) -->
      <div id="landingCharPicker" style="display:none; margin-top:16px; width:100%;">
        <div class="mini" style="margin-bottom:8px; font-weight:600;">Select a character:</div>
        <div id="charPickerList" style="display:flex; flex-direction:column; gap:6px; max-height:240px; overflow-y:auto;"></div>
        <button class="btn landing-btn" id="btnNewChar" style="margin-top:10px; width:100%;">+ New Character</button>
        <div id="newCharForm" style="display:none; margin-top:8px;">
          <input type="text" id="newCharNameInput" placeholder="Character name…" maxlength="60"
            style="width:100%; padding:10px; font-size:16px;" />
          <div id="newCharError" class="mini" style="display:none; color:var(--bad); margin-top:4px;"></div>
          <div style="display:flex; gap:6px; margin-top:6px;">
            <button class="btn landing-btn" id="btnNewCharConfirm" style="flex:1;">Create</button>
            <button class="btn landing-btn" id="btnNewCharCancel" style="flex:1;">Cancel</button>
          </div>
        </div>
        <button class="btn landing-btn" id="btnLoadFromCode" style="margin-top:6px; width:100%;">Load from Code</button>
        <div id="loadCodeForm" style="display:none; margin-top:8px;">
          <textarea id="landingCodeInput" placeholder="Paste share code here…" style="width:100%; min-height:60px; font-size:11px; word-break:break-all;"></textarea>
          <div id="loadCodeError" class="mini" style="display:none; color:var(--bad); margin-top:4px;"></div>
          <div style="display:flex; gap:6px; margin-top:6px;">
            <button class="btn landing-btn" id="btnLandingLoadCode" style="flex:1;">Load</button>
            <button class="btn landing-btn" id="btnCancelLoadCode" style="flex:1;">Cancel</button>
          </div>
        </div>
        <button class="btn landing-btn" id="btnBackFromPicker" style="margin-top:6px; width:100%;">← Back</button>
      </div>
      <!-- Mode picker (step 3) -->
      <div id="landingModePicker" style="display:none; margin-top:16px; width:100%;">
        <div class="mini" style="margin-bottom:8px; font-weight:600;" id="landingModeLabel"></div>
        <div style="display:flex; gap:10px;">
          <button class="btn landing-btn" id="btnGoSolo" style="flex:1;">Play Solo</button>
          <button class="btn landing-btn" id="btnGoJoin" style="flex:1;">Join Game</button>
        </div>
        <div id="landingJoinForm" style="display:none; margin-top:10px;">
          <input type="text" id="mpCodeInput" placeholder="Enter room code" maxlength="8"
            style="text-transform:uppercase; letter-spacing:3px; font-size:20px; text-align:center; width:100%; padding:10px;" />
          <button class="btn landing-btn" id="btnJoinConfirm" style="margin-top:8px; width:100%;">Connect</button>
        </div>
        <button class="btn landing-btn" id="btnBackFromMode" style="margin-top:6px; width:100%;">← Back</button>
      </div>
      <div id="landingStatus" class="mini" style="margin-top:12px; min-height:18px;"></div>
      <div id="landingAuthBar" style="margin-top:16px;"></div>
    </div>
  </div>

  <!-- Host DM view -->
  <div id="hostView" style="display:none;">
    <div id="hostViewInner"></div>
  </div>

  <!-- Normal app -->
  <div class="app" style="display:none;">
    <main class="main">
      <div class="card" id="headerCard"></div>
      <div class="card" id="tabsCard"></div>
      <div class="card" id="menuPanel" style="display:none;">
        <div class="grid2">
          <div class="col">
            <h2>Character</h2>
            <button class="btn" id="btnGetCode">Get Share Code</button>
            <div id="codeOutputBox" style="display:none; margin-top:6px;">
              <textarea id="codeOutput" readonly style="min-height:60px; font-size:11px; word-break:break-all;"></textarea>
              <button class="btn" id="btnCopyCode" style="margin-top:4px; width:100%;">Copy Code</button>
            </div>
            <button class="btn danger" id="btnWipe">Wipe Local Save</button>
            <button class="btn" id="btnMainMenu" style="margin-top:8px;">Return to Main Menu</button>
          </div>
          <div class="col">
            <h2>Load Share Code</h2>
            <textarea id="codeImportText" placeholder="Paste share code here…" style="min-height:60px; font-size:11px; word-break:break-all;"></textarea>
            <button class="btn" id="btnLoadCode">Load Code</button>
          </div>
        </div>
      </div>
      <div class="card" id="contentCard"></div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="js/constants.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/state.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/data.js"></script>
  <script src="js/actions.js"></script>
  <script src="js/fields.js"></script>
  <script src="js/multiplayer.js"></script>
  <script src="js/tabs/overview.js"></script>
  <script src="js/tabs/stats.js"></script>
  <script src="js/tabs/character.js"></script>
  <script src="js/tabs/features.js"></script>
  <script src="js/tabs/spells.js"></script>
  <script src="js/tabs/combat.js"></script>
  <script src="js/tabs/conditions_exhaustion.js"></script>
  <script src="js/tabs/inventory.js"></script>
  <script src="js/tabs/camp.js"></script>
  <script src="js/tabs/settings.js"></script>
  <script src="js/renderHeader.js"></script>
  <script src="js/renderTabs.js"></script>
  <script src="js/render.js"></script>
  <script src="js/tutorial.js"></script>
  <script src="js/landing.js"></script>
  <script src="js/boot.js"></script>
</body>
</html>
