<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DnD Character Tracker (Local)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Landing screen -->
  <div id="landingOverlay">
    <div class="landing-card">
      <div class="landing-title">⚔️ DnD Character Tracker</div>
      <div class="landing-sub">Choose how you want to play</div>
      <div class="landing-btns">
        <button class="btn landing-btn" id="btnSolo">Play Solo</button>
        <button class="btn landing-btn" id="btnHost">Host a Game</button>
        <button class="btn landing-btn" id="btnJoin">Join a Game</button>
      </div>
      <div id="landingJoinForm" style="display:none; margin-top:16px;">
        <input type="text" id="mpCodeInput" placeholder="Enter room code" maxlength="8"
          style="text-transform:uppercase; letter-spacing:3px; font-size:20px; text-align:center; width:100%; padding:10px;" />
        <button class="btn landing-btn" id="btnJoinConfirm" style="margin-top:8px;">Connect</button>
      </div>
      <div id="landingStatus" class="mini" style="margin-top:12px; min-height:18px;"></div>
    </div>
  </div>

  <!-- Host DM view -->
  <div id="hostView" style="display:none;">
    <div id="hostViewInner"></div>
  </div>

  <!-- Normal app -->
  <div class="app" style="display:none;">
    <main class="main">
      <div class="card" id="headerCard"></div>
      <div class="card" id="tabsCard"></div>
      <div class="card" id="menuPanel" style="display:none;">
        <div class="grid3">
          <div class="col">
            <h2>Character</h2>
            <button class="btn" id="btnNew">New Character</button>
            <button class="btn" id="btnDownload">Download JSON</button>
            <button class="btn danger" id="btnWipe">Wipe Local Save</button>
            <button class="btn" id="btnMainMenu" style="margin-top:8px;">Return to Main Menu</button>
          </div>
          <div class="col">
            <h2>Import JSON</h2>
            <textarea id="importText" placeholder="Paste character JSON here…" style="min-height:80px;"></textarea>
            <button class="btn" id="btnLoad">Load JSON</button>
            <button class="btn" id="btnLoadExample">Load Example</button>
            <label class="btn" style="text-align:center; cursor:pointer;">
              Load from File
              <input type="file" id="fileInput" accept=".json" style="display:none;" />
            </label>
          </div>
          <div class="col">
            <h2>DMGPT Prompt</h2>
            <textarea id="promptText" readonly style="min-height:80px;"></textarea>
            <button class="btn" id="btnCopyPrompt">Copy Prompt</button>
            <button class="btn" id="btnCopySchema">Copy Schema Example</button>
          </div>
        </div>
      </div>
      <div class="card" id="contentCard"></div>
    </main>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
